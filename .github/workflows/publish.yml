name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]

    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: |
          plutil -convert binary1 "./${{ matrix.os }}/VoiceOver/VoiceOver4.portable/default.plist"
          plutil -convert binary1 "./${{ matrix.os }}/VoiceOver/VoiceOver4.portable/master.plist"

          hdiutil create \
            -fs APFS \
            -volname guidepup-voiceover-preferences-${{ matrix.os }} \
            -srcfolder "./${{ matrix.os }}" \
            -format UDRW \
            -ov \
            guidepup-voiceover-preferences-${{ matrix.os }}.dmg

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload \
            "${{ github.event.release.tag_name }}" \
            guidepup-voiceover-preferences-${{ matrix.os }}.dmg \
            --clobber
