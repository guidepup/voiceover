name: Portable Preferences PoC

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  poc:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]

    steps:
      - uses: actions/checkout@v6

      - name: Setup OS for VO automation
        uses: guidepup/setup-action@0.21.0

      - name: Disable Splash
        run: |
          defaults write com.apple.VoiceOverTraining doNotShowSplashScreen -bool true || true

      - name: Set Default Greeting
        run: |
          defaults write com.apple.VoiceOver4/default loginGreeting -string "Default Greeting" || true

      - name: Determine VoiceOver Preferences Location
        id: vo-path
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            macos-14)
              PREFS_DIR="$HOME/Library/Preferences"
              ;;
            *)
              PREFS_DIR="$HOME/Library/Group Containers/group.com.apple.VoiceOver/Library/Preferences"
              ;;
          esac

          echo "prefs_dir=$PREFS_DIR" >> "$GITHUB_OUTPUT"

      - name: Start VoiceOver To Trigger Preferences Creation (If Needed)
        run: |
          PLIST="${{ steps.vo-path.outputs.prefs_dir }}/com.apple.VoiceOver4.local.plist"

          if [[ ! -f "$PLIST" ]]; then
            /System/Library/CoreServices/VoiceOver.app/Contents/MacOS/VoiceOverStarter &

            until [[ -f "$PLIST" ]]; do
              sleep 0.5
            done
          fi

          /usr/bin/osascript stop-vo.applescript || true

      - name: Read com.apple.VoiceOver4.local.plist
        run: |
          plutil -convert xml1 -o - "${{ steps.vo-path.outputs.prefs_dir }}/com.apple.VoiceOver4.local.plist" || true

      - name: Read Portable Identifier
        id: portable
        run: |
          IDENTIFIER=$(
            /usr/libexec/PlistBuddy \
              -c "Print :identifier" \
              "./${{ matrix.os }}/VoiceOver/VoiceOver4.portable/voidentifier"
          )
          echo "$IDENTIFIER"
          echo "identifier=$IDENTIFIER" >> "$GITHUB_OUTPUT"

      - name: Restart cfprefsd
        run: |
          killall cfprefsd || true

      - name: Trust Portable Preferences
        env:
          IDENTIFIER: ${{ steps.portable.outputs.identifier }}
        run: |
          PLIST="${{ steps.vo-path.outputs.prefs_dir }}/com.apple.VoiceOver4.local.plist"

          /usr/libexec/PlistBuddy -c "Print :SCRCUserDefaultsAlwaysUsePortableIDs" "$PLIST" >/dev/null 2>&1 || {
            /usr/libexec/PlistBuddy -c "Add :SCRCUserDefaultsAlwaysUsePortableIDs array" "$PLIST"
          }

          if ! /usr/libexec/PlistBuddy -c "Print :SCRCUserDefaultsAlwaysUsePortableIDs" "$PLIST" | grep -Fxq "$IDENTIFIER"; then
            INDEX=$(
              /usr/libexec/PlistBuddy -c "Print :SCRCUserDefaultsAlwaysUsePortableIDs" "$PLIST" |
              tail -n +2 |
              wc -l |
              tr -d ' '
            )

            /usr/libexec/PlistBuddy -c "Add :SCRCUserDefaultsAlwaysUsePortableIDs:$INDEX string $IDENTIFIER" "$PLIST"
          fi

          plutil -convert xml1 -o - "$PLIST" || true

      - name: Restart cfprefsd
        run: |
          killall cfprefsd || true

      - name: Create Portable Preferences Symlinks
        run: |
          VO_PORTABLE="/Volumes/GuidepupVoiceOverPreferences/VoiceOver/VoiceOver4.portable"
          PREFS_DIR="${{ steps.vo-path.outputs.prefs_dir }}"

          ln -sf "$VO_PORTABLE" "$PREFS_DIR/com.apple.VoiceOver4.portable.scrd"
          ln -sf "$VO_PORTABLE" "$PREFS_DIR/com.apple.VoiceOver4.portable.scrd.vou"
          ln -sf "$VO_PORTABLE" "$PREFS_DIR/com.apple.VoiceOver4.portable.scro"
          ln -sf "$VO_PORTABLE" "$PREFS_DIR/com.apple.VoiceOver4.portable.scui"

      - name: Restart cfprefsd
        run: |
          killall cfprefsd || true

      - name: Create Volume
        run: |
          plutil -convert binary1 "./${{ matrix.os }}/VoiceOver/VoiceOver4.portable/default.plist"
          plutil -convert binary1 "./${{ matrix.os }}/VoiceOver/VoiceOver4.portable/master.plist"

          hdiutil create \
            -fs APFS \
            -volname GuidepupVoiceOverPreferences \
            -srcfolder "./${{ matrix.os }}" \
            -format UDRW \
            -ov \
            GuidepupVoiceOverPreferences.dmg

          hdiutil attach \
            GuidepupVoiceOverPreferences.dmg \
            -mountpoint /Volumes/GuidepupVoiceOverPreferences

          ls -R /Volumes/GuidepupVoiceOverPreferences

      - name: Open & Close VoiceOver Utility
        run: |
          mkdir -p artifacts || true
          /usr/bin/osascript start-vo-utility.applescript || true
          sleep 5
          screencapture artifacts/vo-utility-end.png || true
          /usr/bin/osascript stop-vo-utility.applescript || true
          sleep 1

      - name: Launch & Verify VoiceOver Welcome Greeting
        run: |
          mkdir -p artifacts || true

          /System/Library/CoreServices/VoiceOver.app/Contents/MacOS/VoiceOverStarter &

          for i in {1..20}; do
            echo "Attempt: $i"
            ACTUAL=$(/usr/bin/osascript voiceOverPerform.applescript 2>/dev/null || true)
            echo "Spoken Phrase: $ACTUAL"
            screencapture artifacts/vo-$i.png || true
            sleep 0.1
          done

          /usr/bin/osascript stop-vo.applescript || true
          sleep 1

      - name: Cleanup
        if: always()
        run: |
          hdiutil detach /Volumes/GuidepupVoiceOverPreferences || true
          rm -f GuidepupVoiceOverPreferences.dmg || true

      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: artifacts-${{ matrix.os }}
          path: |
            **/artifacts/**/*
